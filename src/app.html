<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap"
			rel="stylesheet"
		/>
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f3eadc" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#171914" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Kartike Chawla" />
		<!-- TODO: set <link rel="canonical">, og:url and og:image once the domain is live -->
		<script>
			// Apply the saved/system theme before first paint to avoid a flash of the
			// wrong theme. Wrapped in try/catch so a blocked localStorage never breaks render.
			(function () {
				try {
					var t = localStorage.getItem("theme");
					var dark = t ? t === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
					var el = document.documentElement;
					el.classList.toggle("dark", dark);
					el.style.colorScheme = dark ? "dark" : "light";
				} catch (e) {}
			})();
		</script>
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "Person",
				"name": "Kartike Chawla",
				"jobTitle": "Software Developer",
				"worksFor": { "@type": "Organization", "name": "Tools for Humanity" },
				"sameAs": ["https://github.com/kchaw2005", "https://linkedin.com/in/kchaw2005"]
			}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
